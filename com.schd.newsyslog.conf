# newsyslog config for schd — install to /etc/newsyslog.d/com.schd.conf
# Replace $HOME with your actual home directory path.
#
# logfilename                                          [owner:group] mode count size(KB) when  flags
$HOME/Library/Logs/schd/daemon.err.log                               644   5     1024     *     GN
$HOME/Library/Logs/schd/daemon.out.log                               644   5     1024     *     GN
